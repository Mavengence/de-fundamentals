<svg viewBox="0 0 840 310" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
<style>
  

  @keyframes r0 {
    0%    { opacity: .9 }
    20%   { opacity: .9 }
    25%   { opacity: 0  }
    100%  { opacity: 0  }
  }
  @keyframes r1 {
    0%    { opacity: 0  }
    25%   { opacity: 0  }
    26%   { opacity: .9 }
    45%   { opacity: .9 }
    50%   { opacity: 0  }
    100%  { opacity: 0  }
  }
  @keyframes r2 {
    0%    { opacity: 0  }
    50%   { opacity: 0  }
    51%   { opacity: .9 }
    70%   { opacity: .9 }
    75%   { opacity: 0  }
    100%  { opacity: 0  }
  }
  @keyframes r3 {
    0%    { opacity: 0  }
    75%   { opacity: 0  }
    76%   { opacity: .9 }
    96%   { opacity: .9 }
    100%  { opacity: 0  }
  }
  .row-0 { animation: r0 5s linear infinite; }
  .row-1 { animation: r1 5s linear infinite; }
  .row-2 { animation: r2 5s linear infinite; }
  .row-3 { animation: r3 5s linear infinite; }

  @keyframes col-glow {
    0%, 100% { fill: #1d4ed8; }
    50%      { fill: #60a5fa; }
  }
  .col-target { animation: col-glow 2s ease-in-out infinite; }
</style>

<!-- Background -->
<rect width="840" height="310" fill="#0d1117" rx="12"/>

<!-- Top label -->
<text x="420" y="28" text-anchor="middle"
      fill="#6b7280" font-size="11.5" font-weight="600" letter-spacing="0.8">
  SELECT SUM(revenue) FROM sales
</text>

<!-- Divider -->
<line x1="420" y1="40" x2="420" y2="268"
      stroke="#1f2937" stroke-width="1.5"/>

<!-- ====================== LEFT: ROW STORAGE ====================== -->

<text x="210" y="55" text-anchor="middle"
      fill="#f87171" font-size="10.5" font-weight="700" letter-spacing="1.5">
  ROW STORAGE
</text>

<!-- Grid: 5 cols x 4 rows, each cell 52x30, gap 5px -->
<!-- Col x offsets from 50: 0, 57, 114, 171, 228 -->
<!-- Row y offsets from 65: 0, 35, 70, 105 -->

<!-- Row 0 base cells -->
<rect x="50"  y="65" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="107" y="65" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="164" y="65" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="221" y="65" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="278" y="65" width="52" height="30" rx="3" fill="#1e293b"/>
<!-- Row 1 base cells -->
<rect x="50"  y="100" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="107" y="100" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="164" y="100" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="221" y="100" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="278" y="100" width="52" height="30" rx="3" fill="#1e293b"/>
<!-- Row 2 base cells -->
<rect x="50"  y="135" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="107" y="135" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="164" y="135" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="221" y="135" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="278" y="135" width="52" height="30" rx="3" fill="#1e293b"/>
<!-- Row 3 base cells -->
<rect x="50"  y="170" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="107" y="170" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="164" y="170" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="221" y="170" width="52" height="30" rx="3" fill="#1e293b"/>
<rect x="278" y="170" width="52" height="30" rx="3" fill="#1e293b"/>

<!-- Animated row overlays (amber sweep, opacity 0 by default) -->
<rect class="row-0" x="50" y="65"  width="280" height="30" rx="3" fill="#f59e0b" opacity="0"/>
<rect class="row-1" x="50" y="100" width="280" height="30" rx="3" fill="#f59e0b" opacity="0"/>
<rect class="row-2" x="50" y="135" width="280" height="30" rx="3" fill="#f59e0b" opacity="0"/>
<rect class="row-3" x="50" y="170" width="280" height="30" rx="3" fill="#f59e0b" opacity="0"/>

<!-- Column header labels (above grid) -->
<text x="76"  y="61" text-anchor="middle" fill="#374151" font-size="8" font-weight="600">id</text>
<text x="133" y="61" text-anchor="middle" fill="#374151" font-size="8" font-weight="600">name</text>
<text x="190" y="61" text-anchor="middle" fill="#374151" font-size="8" font-weight="600">region</text>
<text x="247" y="61" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="700">revenue</text>
<text x="304" y="61" text-anchor="middle" fill="#374151" font-size="8" font-weight="600">ts</text>

<!-- Progress bar: full scan (SMIL animation, reliable across SVG renderers) -->
<rect x="50" y="214" width="280" height="5" rx="2" fill="#1f2937"/>
<rect x="50" y="214" width="0"   height="5" rx="2" fill="#f59e0b">
  <animate attributeName="width" from="0" to="280" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Stats -->
<text x="50"  y="232" fill="#6b7280" font-size="10.5">Columns scanned</text>
<text x="330" y="232" fill="#f87171" font-size="10.5" text-anchor="end" font-weight="700">5 of 5</text>
<text x="50"  y="248" fill="#6b7280" font-size="10.5">Data read</text>
<text x="330" y="248" fill="#f87171" font-size="10.5" text-anchor="end" font-weight="700">100%</text>


<!-- ====================== RIGHT: COLUMNAR ====================== -->

<text x="630" y="55" text-anchor="middle"
      fill="#4ade80" font-size="10.5" font-weight="700" letter-spacing="1.5">
  COLUMNAR STORAGE
</text>

<!-- Dimmed columns (not revenue) -->
<!-- Col 0: id -->
<rect x="460" y="65"  width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="460" y="100" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="460" y="135" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="460" y="170" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<!-- Col 1: name -->
<rect x="517" y="65"  width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="517" y="100" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="517" y="135" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="517" y="170" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<!-- Col 2: region -->
<rect x="574" y="65"  width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="574" y="100" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="574" y="135" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="574" y="170" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<!-- Col 3: revenue: TARGET column. fill attr set, CSS animation adds glow -->
<rect class="col-target" fill="#1d4ed8" x="631" y="65"  width="52" height="30" rx="3"/>
<rect class="col-target" fill="#1d4ed8" x="631" y="100" width="52" height="30" rx="3"/>
<rect class="col-target" fill="#1d4ed8" x="631" y="135" width="52" height="30" rx="3"/>
<rect class="col-target" fill="#1d4ed8" x="631" y="170" width="52" height="30" rx="3"/>
<!-- Col 4: ts -->
<rect x="688" y="65"  width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="688" y="100" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="688" y="135" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>
<rect x="688" y="170" width="52" height="30" rx="3" fill="#1e293b" opacity=".1"/>

<!-- Column header labels -->
<text x="486" y="61" text-anchor="middle" fill="#1f2937" font-size="8" font-weight="600">id</text>
<text x="543" y="61" text-anchor="middle" fill="#1f2937" font-size="8" font-weight="600">name</text>
<text x="600" y="61" text-anchor="middle" fill="#1f2937" font-size="8" font-weight="600">region</text>
<text x="657" y="61" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="700">revenue</text>
<text x="714" y="61" text-anchor="middle" fill="#1f2937" font-size="8" font-weight="600">ts</text>

<!-- Progress bar: columnar (fills 5x faster, SMIL animation) -->
<rect x="460" y="214" width="280" height="5" rx="2" fill="#1f2937"/>
<rect x="460" y="214" width="0"   height="5" rx="2" fill="#22c55e">
  <animate attributeName="width" from="0" to="280" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- Stats -->
<text x="460"  y="232" fill="#6b7280" font-size="10.5">Columns scanned</text>
<text x="740"  y="232" fill="#4ade80" font-size="10.5" text-anchor="end" font-weight="700">1 of 5</text>
<text x="460"  y="248" fill="#6b7280" font-size="10.5">Data read</text>
<text x="740"  y="248" fill="#4ade80" font-size="10.5" text-anchor="end" font-weight="700">20%</text>

<!-- Bottom caption -->
<text x="420" y="285" text-anchor="middle"
      fill="#374151" font-size="10.5">
  The interactive simulator has 100 columns and 40 rows with a compression toggle.
</text>

</svg>
