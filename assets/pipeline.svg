<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <title>Data Engineering Fundamentals: 10-chapter learning path</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ── Row 1 arrows (left → right) ──────────────────────────── -->
  <line x1="130" y1="62" x2="152" y2="62" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="275" y1="62" x2="297" y2="62" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="62" x2="442" y2="62" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="62" x2="587" y2="62" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="710" y1="62" x2="732" y2="62" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Bend: bottom of 05 → top of 06 (straight vertical) ───── -->
  <line x1="795" y1="95" x2="795" y2="163" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 2 arrows (right → left) ──────────────────────────── -->
  <line x1="735" y1="197" x2="713" y2="197" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="590" y1="197" x2="568" y2="197" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="445" y1="197" x2="423" y2="197" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="197" x2="278" y2="197" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ROW 1 — chapters 00–05 (y=30, height=65) ══════════════ -->

  <!-- 00 Core Fundamentals -->
  <rect x="10"  y="30" width="120" height="65" rx="8" fill="#1a2744"/>
  <text x="70"  y="52" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="10" font-weight="600">00</text>
  <text x="70"  y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Fundamentals</text>

  <!-- 01 Ingest -->
  <rect x="155" y="30" width="120" height="65" rx="8" fill="#6d4eef"/>
  <text x="215" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">01</text>
  <text x="215" y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Ingest</text>

  <!-- 02 Streaming -->
  <rect x="300" y="30" width="120" height="65" rx="8" fill="#0891b2"/>
  <text x="360" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">02</text>
  <text x="360" y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Streaming</text>

  <!-- 03 Store -->
  <rect x="445" y="30" width="120" height="65" rx="8" fill="#2563eb"/>
  <text x="505" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">03</text>
  <text x="505" y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Store</text>

  <!-- 04 Compute -->
  <rect x="590" y="30" width="120" height="65" rx="8" fill="#c2552a"/>
  <text x="650" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">04</text>
  <text x="650" y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Compute</text>

  <!-- 05 Orchestrate -->
  <rect x="735" y="30" width="120" height="65" rx="8" fill="#1e7e34"/>
  <text x="795" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">05</text>
  <text x="795" y="72" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Orchestrate</text>

  <!-- ══ ROW 2 — chapters 06–10, right→left (y=165, height=65) ══ -->

  <!-- 06 Quality (rightmost, connects to 05 above) -->
  <rect x="735" y="165" width="120" height="65" rx="8" fill="#b91c3a"/>
  <text x="795" y="187" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">06</text>
  <text x="795" y="207" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Quality</text>

  <!-- 07 Discover -->
  <rect x="590" y="165" width="120" height="65" rx="8" fill="#92520a"/>
  <text x="650" y="187" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">07</text>
  <text x="650" y="207" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Discover</text>

  <!-- 08 Serve -->
  <rect x="445" y="165" width="120" height="65" rx="8" fill="#006bb5"/>
  <text x="505" y="187" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">08</text>
  <text x="505" y="207" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Serve</text>

  <!-- 09 Govern -->
  <rect x="300" y="165" width="120" height="65" rx="8" fill="#6d28d9"/>
  <text x="360" y="187" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">09</text>
  <text x="360" y="207" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Govern</text>

  <!-- 10 Capstone (end of path) -->
  <rect x="155" y="165" width="120" height="65" rx="8" fill="#b84004"/>
  <text x="215" y="187" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-weight="600">10</text>
  <text x="215" y="207" text-anchor="middle" fill="white" font-size="11.5" font-weight="700">Capstone</text>

</svg>
